<!DOCTYPE html>
<html>
    <head>
        <title>Principal</title>
        <meta charset="UTF-8">
        <!-- Bootstrap -->
        <link rel="stylesheet">
      
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
         <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
                <!-- llamar al estilo de la pagina-->
         <link rel="stylesheet" href="{{ url_for('static', filename='ingresar.css')}}">
    </head>

    <body>
     <div class="container mt-5">
            <div class="card shadow p-4">
                <h1>INICIAR SESION</h1>
             <form method="POST" action="{{ url_for('login_form')}}">
                            <div class="mb-3 mt-3">
                                <label>Ingresar nombre usuario</label>
                                <input type="text" class="form-control" name="txtusuario" placeholder="Ingresar usuario">
                            </div>
                            <div class="mb-3">
                                <label>Ingresar contraseña:</label>
                                <input type="password" class="form-control" placeholder="Ingresar password" name="txtcontrasena">
                            </div>

                             <button type="submit" class="btn btn-danger" data-bs-dismiss="modal">Ingresar</button>
                              <div class="text-center mt-3">
                        <a href="" class="text-decoration-none">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>
                          </form>
            
            </div>

     </div>


    </body>
