<!DOCTYPE html>
<html>
    <head>
        <title>Principal</title>
        <meta charset="UTF-8">
        <!-- Bootstrap -->
        <link rel="stylesheet">
      
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
         <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
                <!-- llamar al estilo de la pagina-->
         <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
    </head>

    <body>
        <div class="container mt-5">
            <div class="card shadow p-4">
            <h1 class="text-center text-primary">
                BIENVENIDO A MI GESTOR DE USUARIOS
            </h1>
            <div class="text-center">
                <button  type = "button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#myModal">
                Registrar Usuario
                </button>
                <button class="btn btn-primary">
                Ver Usuarios
                </button>
                <a href="{{ url_for('salir')}}" class="btn btn-danger">
                Cerrar sesión
                </a>
            </div>
           <!-- llamar al modal-->
            {% include 'registrarusu.html' %}
            <table class="table table-bordered mt-3">

                <thead class="table-dark">
                    <tr>
                        <td>Codigo</td>
                        <td>Usuario</td>
                        <td>Contraseña</td>
                        <td>Rol</td>
                        <td>Opciones</td>

                    </tr>
                </thead>
                <tbody>

                        {% for u in user %}
                        <tr>
                          <td>{{ u[0]}} </td>
                          <td>{{ u[1]}}</td>
                          <td>{{ u[2]}}</td>
                          <td>{{ u[3]}}</td>
                           <td>
                           <a href=""class="btn btn-warning btn-sm">Editar</a>

                           <a href="{{ url_for('eliminarusu', id=u[0]) }}"class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Seguro que desea eliminar el usuario?')">Eliminar </a>
                          </td>

                        </tr>
                        
                        {% endfor %}

                </tbody>
            </table>
        </div>

    </body>
</html>
