<!DOCTYPE html>
<html>
    <head>
        <title>Registro</title>
        <meta charset="UTF-8">
        <!-- Bootstrap -->
        <link rel="stylesheet">
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
         <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
                <!-- llamar al estilo de la pagina-->
         <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
    </head>

    <body>
            <!--creamos el modal-->
            <div class="modal" id="modalempleado">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <!--definir el header-->
                        <div class="modal-header">
                            <h4 class="modal-title">Registro de empleados</h4>
                           <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <!--definir el cuerpo del modal---formulario-->
                        <div class="modal-body">
                          <form method="POST" action="{{ url_for('guardar_usuario') }}">
                            <div class="mb-3 mt-3">
                                <label>Ingresar documento empleado</label>
                                <input type="number" class="form-control" name="txtdocu" placeholder="Ingresar documento">
                            </div>
                            <div class="mb-3">
                                <label>Ingresar nombre del empleado:</label>
                                <input type="text" class="form-control" placeholder="Ingresar nombre del empleado" name="txtnombre">
                            </div>
                              <div class="mb-3">
                                <label>Ingresar apellido del empleado:</label>
                                <input type="text" class="form-control" placeholder="Ingresar apellido del empleado" name="txtapellido">
                              </div>
                               <div class="mb-3">
                                <label>Ingresar cargo del empleado:</label>
                                <input type="text" class="form-control" placeholder="Ingresar cargo del empleado" name="txtcargo">
                              </div>
                              <div class="mb-3">
                                <label>Ingresar horas extras del empleado:</label>
                                <input type="number" class="form-control" placeholder="Ingresar horas del empleado" name="txthoras">
                              </div>
                              <div class="mb-3">
                                <label>Ingresar bonificacion del empleado:</label>
                                <input type="number" class="form-control" placeholder="Ingresar bonificacion del empleado" name="txtbonificacion">
                              </div>
                            
                        
                              <button type="submit" class="btn btn-danger" data-bs-dismiss="modal">Registrar</button> 
                          </form>
                        </div>
                        <!--definir el pie de pagina del formulario-->
                        <div class="modal-footer">
                       

                        </div>
                    </div>

                </div>

            </div>

    </body>
</html>
